<!DOCTYPE html>
<html>
<head>
    <title>Student Result</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .card {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        .result {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Student Marksheet</h2>

    <p><b>ID:</b> {{ id }}</p>
    <p><b>Name:</b> {{ name }}</p>

    <table>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>DSA</td>
            <td>{{ dsa }}</td>
        </tr>

        <tr>
            <td>C++</td>
            <td>{{ cpp }}</td>
        </tr>

        <tr>
            <td>Python</td>
            <td>{{ python }}</td>
        </tr>

        <tr>
            <td>Java</td>
            <td>{{ java }}</td>
        </tr>

        <tr>
            <td>HTML</td>
            <td>{{ html }}</td>
        </tr>
    </table>

    <div class="result">
        <h3>Total: {{ total }}</h3>
        <h3>Percentage: {{ percentage }}%</h3>
        <h3>Grade: {{ grade }}</h3>
    </div>

</div>

</body>
</html>
